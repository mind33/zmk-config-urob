# Dongle (central) configuration.
# Loaded from the shield directory by Zephyr's shield mechanism.

# Two BLE peripherals (left + right halves)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Report battery levels from both peripheral halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Dongle is not a battery-powered peripheral, disable BT Battery Service
CONFIG_BT_BAS=n

# ZMK Studio: runtime keymap editing via USB
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
