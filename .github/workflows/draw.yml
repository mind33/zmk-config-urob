name: Draw keymap

on:
  workflow_dispatch:
  push:
    paths:
      - config/base.keymap
      - draw/config.yaml

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch zmk-helpers
        run: |
          git clone --filter=blob:none --sparse \
            https://github.com/urob/zmk-helpers.git \
            modules/zmk/helpers
          git -C modules/zmk/helpers sparse-checkout set include
          git -C modules/zmk/helpers checkout 0b9e9d1dd9e86f70b4c8c2b0fab55c4f90c9d2e3

      - name: Install Python dependencies
        run: pip install keymap-drawer yq

      - name: Draw keymap
        run: |
          set -euo pipefail

          keymap -c draw/config.yaml parse -z config/base.keymap \
            --virtual-layers Combos > draw/base.yaml
          yq -Yi '.combos.[].l = ["Combos"]' draw/base.yaml
          keymap -c draw/config.yaml draw draw/base.yaml \
            -k "ferris/sweep" > draw/base.svg

          jq_expr='
            def extract_label: if type == "string" then . else .t end;
            def is_transparent: type == "object" and (.type == "trans" or .type == "held");
            .layers = {
            Base: [
                [.layers.Base, .layers.Nav, .layers.Fn, .layers.Num, .layers.Sys] | transpose[] |
                (.[0] | if type == "string" then {t: .} else . end) as $base |
                (.[1] | if is_transparent then null else extract_label end) as $nav |
                (.[2] | if is_transparent then null else extract_label end) as $fn |
                (.[3] | if is_transparent then null else extract_label end) as $num |
                (.[4] | if is_transparent then null else extract_label end) as $sys |
                $base
                + (if $nav == null then {} else {tr: $nav} end)
                + (if $fn == null then {} else {tl: $fn} end)
                + (if $num == null then {} else {bl: $num} end)
                + (if $sys == null then {} else {br: $sys} end)
            ],
            Combos: .layers.Combos
            } |
            .combos = [.combos[] | .l = ["Combos"]]
          '
          yq -y "$jq_expr" draw/base.yaml > draw/overview.yaml
          keymap -c draw/config.yaml draw draw/overview.yaml \
            -k "ferris/sweep" > draw/overview.svg
          sed -i '/<text.*class="label"/d' draw/overview.svg

          rm -f draw/base.yaml draw/overview.yaml

      - name: Commit updated drawings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add draw/base.svg draw/overview.svg
          git diff --staged --quiet || git commit -m "chore: update keymap drawings [skip ci]"
          git push
