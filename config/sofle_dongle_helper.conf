# When the left half is used with the USB dongle it must be a split
# peripheral, not a central.  The dongle itself is the central.
#
# These explicit settings override the sofle_left shield default of
# ZMK_SPLIT_ROLE_CENTRAL=y.  Explicit .conf values always win over
# Kconfig "default" statements.
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# No BLE HID advertising needed: the dongle relays everything to the
# PC over USB.
CONFIG_ZMK_BLE=n
