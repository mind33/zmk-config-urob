# ── Output ──────────────────────────────────────────────────────────────────
# Dongle outputs to PC via USB; BLE stack stays active for split communication.
CONFIG_ZMK_USB=y

# ── Split ────────────────────────────────────────────────────────────────────
# Central role: connect to both Sofle halves as BLE peripherals.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Forward battery levels reported by the keyboard halves.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ── Features ─────────────────────────────────────────────────────────────────
# Keep mouse/pointing support in sync with the keyboard halves.
CONFIG_ZMK_POINTING=y

# ── Power ────────────────────────────────────────────────────────────────────
# Dongle is USB-powered; no need for sleep.
CONFIG_ZMK_SLEEP=n

# Raise TX power for reliable BLE split communication.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── BLE tweaks ───────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
